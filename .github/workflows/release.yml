name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-dmg:
    name: Build unsigned macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, lint, format, and test
        run: pnpm check

      - name: Build unsigned DMG and update ZIP
        run: pnpm desktop:dist

      - name: Generate checksums
        working-directory: apps/desktop/dist
        # The in-app updater downloads SHA256SUMS.txt and verifies the ZIP it
        # pulls before swapping the bundle, so this must cover every artifact.
        run: shasum -a 256 *.dmg *.zip > SHA256SUMS.txt

      - name: List release artifacts
        run: ls -lh apps/desktop/dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            apps/desktop/dist/*.dmg \
            apps/desktop/dist/*.zip \
            apps/desktop/dist/SHA256SUMS.txt \
            --verify-tag \
            --title "Yui ${GITHUB_REF_NAME}" \
            --notes "Unsigned macOS build for Yui ${GITHUB_REF_NAME}.

          - DMG: first-time install (drag to Applications). macOS may require right-click Open on first launch because the build is not code-signed or notarized.
          - ZIP + SHA256SUMS.txt: consumed by Yui's in-app updater; no need to download manually."
